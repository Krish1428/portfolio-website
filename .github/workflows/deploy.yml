name: CI Build Verification

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies 🔧
        run: npm ci

      - name: Verify Linting 🔍
        run: npm run lint

      - name: Verify Build 🔨
        run: npm run build
